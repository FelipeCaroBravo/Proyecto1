version: "3"

services:

  postgres-db6:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: postgres-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: Test1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  app1:
    build:
      context: ./app1
      dockerfile: Dockerfile
    container_name: spring-app-1
    ports:
      - "8086:8086"
    depends_on:
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/Test1
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    networks:
      - app-network

  app2:
    build:
      context: ./app2
      dockerfile: Dockerfile
    container_name: spring-app-2
    ports:
      - "9996:9996"
    depends_on:
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/Test1
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
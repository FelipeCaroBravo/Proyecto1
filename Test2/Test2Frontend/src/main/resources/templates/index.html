<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Mantenedor Persona API REST</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>

<body>
<div class="container mt-4">

    <h1 class="mb-4">Mantenedor Personas</h1>

    <div class="card mb-4">
        <div class="card-header">
            Ingresar Persona
        </div>
        <div class="card-body">
            <form th:action="@{/crud/persona/save}" th:object="${persona}" method="post">
                <div class="form-group">
                    <label for="id">ID</label>
                    <input type="number" id="id" th:field="*{id}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary">Guardar</button>
            </form>
        </div>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
        <tr>
            <th>ID</th>
            <th>NOMBRE</th>
            <th>FUNCIONES</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="persona : ${personas}">
            <td th:text="${persona.id}"></td>
            <td th:text="${persona.nombre}"></td>
            <td>
                <a class="btn btn-info btn-sm"
                   th:href="@{/crud/persona/ver/{id}(id=${persona.id})}">
                    Ver
                </a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{/crud/persona/del/{id}(id=${persona.id})}">
                    Borrar
                </a>
            </td>
        </tr>
        </tbody>

        <tfoot>
        <tr>
            <th>ID</th>
            <th>NOMBRE</th>
            <th>FUNCIONES</th>
        </tr>
        </tfoot>
    </table>

</div>
</body>
</html>
